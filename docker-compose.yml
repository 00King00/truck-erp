services:
  mongo:
    image: mongo:7
    container_name: truck-erp-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_JWT_TOKEN: ${VITE_JWT_TOKEN}
    container_name: truck-erp-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/truck-erp
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
